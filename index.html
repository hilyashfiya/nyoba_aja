<!DOCTYPE html>
<html>
<head>
    <title>Peta Sederhana</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body { margin: 0; }
        #map { height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script>

// ================= MAP =================
var map = L.map('map').setView([-6.9, 107.6], 9);

// BASEMAP
var osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png');
osm.addTo(map);

// ================= RADIUS RESPONSIVE =================
function getRadius(){
    if (window.innerWidth < 600) {
        return 6;   // HP (lebih besar biar mudah diklik)
    } else if (window.innerWidth < 1024) {
        return 5;   // Tablet
    } else {
        return 4;   // Laptop / Desktop
    }
}

// ================= LOAD DATA =================
fetch("data.geojson") // ganti dengan nama file kamu
.then(res => res.json())
.then(data => {

    L.geoJSON(data, {
        pointToLayer: function(feature, latlng) {
            return L.circleMarker(latlng, {
                radius: getRadius(),
                fillColor: "#ff0000",
                color: "transparent",
                weight: 0,
                fillOpacity: 1
            });
        },
        onEachFeature: function(feature, layer) {
            let p = feature.properties;

            layer.bindPopup(`
                <b>Nama:</b> ${p.Nama || '-'}<br>
                <b>Keterangan:</b> ${p.Keterangan || '-'}
            `);
        }
    }).addTo(map);

});

</script>

</body>
</html>
