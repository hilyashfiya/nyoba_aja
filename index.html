<!DOCTYPE html>
<html>
<head>
    <title>Peta dari Google Sheets</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map {
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPtxo38ft9es4Mt0xn1oqPJQCVmYZcmyYN1GKTUBYz8b4wRX34jbQa5odSjVLwvB-yxuUnDGAV9Pou/pub?gid=2039375183&single=true&output=csv";

const map = L.map('map').setView([-6.9, 107.6], 10);

// Basemap ESRI
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri'
}).addTo(map);

// Ambil data CSV
fetch(csvUrl)
  .then(res => res.text())
  .then(data => {

      console.log("RAW DATA:", data);

      // Cek apakah bukan CSV
      if (data.startsWith("<")) {
          alert("Data bukan CSV! Cek publish Google Sheets");
          return;
      }

      const rows = data.trim().split("\n");

      // Bersihkan header
      const header = rows[0]
        .split(",")
        .map(h => h.replace(/"/g, "").trim().toLowerCase());

      console.log("HEADER:", header);

      // Ambil kolom X dan Y
      const xIndex = header.findIndex(h => h.includes("titik koordinat (x)"));
      const yIndex = header.findIndex(h => h.includes("titik koordinat (y)"));

      console.log("INDEX:", xIndex, yIndex);

      rows.slice(1).forEach(row => {
          const cols = row.split(",");

          let lng = cols[xIndex]?.replace(/"/g, "").trim();
          let lat = cols[yIndex]?.replace(/"/g, "").trim();

          // Handle koma jadi titik
          lng = parseFloat(lng.replace(",", "."));
          lat = parseFloat(lat.replace(",", "."));

          console.log("DATA:", lat, lng);

          if (!isNaN(lat) && !isNaN(lng)) {
              L.marker([lat, lng])
                .addTo(map)
                .bindPopup(`Lat: ${lat}<br>Lng: ${lng}`);
          }
      });
  })
  .catch(err => console.error("ERROR:", err));
</script>

</body>
</html>
