<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Monitoring Domisili Pegawai dan Program Unggulan</title>

<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>
<link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css"/>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
html, body {margin:0; padding:0;}
#map {height:100vh;}

.title {
    position:absolute;
    top:10px;
    left:50%;
    transform:translateX(-50%);
    background:white;
    padding:12px 25px;
    border-radius:12px;
    font-weight:bold;
    font-size:18px;
    z-index:999;
    box-shadow:0 3px 12px rgba(0,0,0,0.3);
}

.legend {
    background:white;
    padding:10px;
    border-radius:8px;
    font-size:13px;
    cursor:pointer;
}

.stat {
    position:absolute;
    bottom:10px;
    left:10px;
    width:300px;
    background:white;
    padding:10px;
    border-radius:10px;
    z-index:999;
}
</style>
</head>

<body>

<div class="title">Monitoring Domisili Pegawai dan Program Unggulan</div>
<div id="map"></div>

<div class="stat">
<canvas id="chartPJL"></canvas>
<canvas id="chartPersemaian"></canvas>
<canvas id="chartPegawai"></canvas>
<canvas id="chartJumat"></canvas>
</div>

<script>

// ================= MAP =================
const map = L.map('map').setView([-6.9,107.6],8);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

// ================= ICON =================
function icon(e){
    return L.divIcon({
        html:`<div style="font-size:12px">${e}</div>`,
        className:'',
        iconSize:[12,12]
    });
}

// ================= CLUSTER =================
const clusterPJL = L.markerClusterGroup();
const clusterPersemaian = L.markerClusterGroup();
const clusterPegawai = L.markerClusterGroup();
const clusterJumat = L.markerClusterGroup();

map.addLayer(clusterPJL);
map.addLayer(clusterPersemaian);
map.addLayer(clusterPegawai);
map.addLayer(clusterJumat);

// ================= HELPER =================
function safe(v){return v && v!=="" ? v : "Data tidak tersedia";}
function toF(v){return parseFloat((v||"").toString().replace(",", "."));}

// ================= GEOJSON =================
let geoKab;
fetch("Jawa Barattt.geojson")
.then(r=>r.json())
.then(g=>{
    geoKab = L.geoJSON(g,{
        style:{color:"#555",weight:1},
        onEachFeature:(f,l)=>{
            l.bindPopup("Kabupaten: "+f.properties.KAB_KOTA);
        }
    }).addTo(map);
});

// ================= POINT IN POLYGON =================
function getKab(lat,lng){
    let found="Tidak diketahui";
    geoKab.eachLayer(l=>{
        if(l.getBounds().contains([lat,lng])){
            found = l.feature.properties.KAB_KOTA;
        }
    });
    return found;
}

// ================= DATA =================
let dataPJL=[],dataPersemaian=[],dataPegawai=[],dataJumat=[];

// ================= LOAD CSV =================
function loadCSV(url,type){

Papa.parse(url,{
download:true,
header:true,
skipEmptyLines:true,

complete:function(res){

let d = res.data;

// ================= PJL =================
if(type==="pjl"){

let grouped = {};

d.forEach(r=>{

let lat = toF(r["Titik Koordinat Penanaman (Y)"]);
let lng = toF(r["Titik Koordinat Penanaman (X)"]);
let penyuluh = safe(r["Penyuluh Kehutanan"]);

if(!lat || !lng || isNaN(lat) || isNaN(lng)) return;

let key = lat+"_"+lng+"_"+penyuluh;

if(!grouped[key]) grouped[key]=[];
grouped[key].push(r);

});

Object.values(grouped).forEach(group=>{

let r = group[0];
let lat = toF(r["Titik Koordinat Penanaman (Y)"]);
let lng = toF(r["Titik Koordinat Penanaman (X)"]);

let html = `<b>Penyuluh Kehutanan:</b> ${safe(r["Penyuluh Kehutanan"])}<hr>`;

group.forEach(g=>{
html += `
<b>Unit Kerja:</b> ${safe(g["Unit Kerja"])}<br>
<b>Nama Lengkap:</b> ${safe(g["Nama Lengkap"])}<br>
<b>Kawasan Leuweung/Gunung:</b> ${safe(g["Kawasan Leuweung/ Gunung"])}<br>
<b>Koordinat Penanaman:</b> ${safe(g["Titik Koordinat Penanaman (X)"])} , ${safe(g["Titik Koordinat Penanaman (Y)"])}<br>
<b>Koordinat Persemaian:</b> ${safe(g["Titik Koordinat Persemaian (X)"])} , ${safe(g["Titik Koordinat Persemaian (Y)"])}<br>
<b>Pemangku Penanaman/Pemilik Lahan:</b> ${safe(g["Pemangku Penanaman/ Pemilik Lahan"])}<br>
<b>Wilayah Binaan Kuncen:</b> ${safe(g["Wilayah Binaan Kuncen"])}<br>
<b>Wilayah Binaan Jaga Leuweung:</b> ${safe(g["Wilayah Binaan Jaga Leuweung"])}<br>
<b>Penyuluh Kehutanan:</b> ${safe(g["Penyuluh Kehutanan"])}<br>
<b>PEH:</b> ${safe(g["Pengendali Ekosistem Hutan (PEH)"])}<br>
<b>BA Jaga Leuweung:</b> <a href="${safe(g["Upload Link BA Jaga Leuweung (Validasi, surat pengantar desa, dll.)"])}" target="_blank">Link</a><br>
<b>SK Penetapan/Penerima Manfaat Jaga Leuweung:</b> <a href="${safe(g["Upload Link SK Penetapan / Penerima Manfaat Jaga Leuweung"])}" target="_blank">Link</a>
<hr>`;
});

let popup = `<div style="max-height:300px;overflow:auto">${html}</div>`;

let m = L.marker([lat,lng],{icon:icon("🧑‍🌾")})
.bindPopup(`<div style="max-height:200px;overflow:auto">${html}</div>`);

clusterPJL.addLayer(m);

dataPJL.push({
unit:r["Unit Kerja"],
kab:getKab(lat,lng)
});

});

}

// ================= PERSEMAIAN =================
if(type==="persemaian"){

d.forEach(r=>{

let lat = toF(r["latitude"]);
let lng = toF(r["longitude"]);

if(!lat || !lng || isNaN(lat) || isNaN(lng)) return;

let m = L.marker([lat,lng],{icon:icon("🌱")})
.bindPopup(`
<div style="max-height:300px;overflow:auto">
<b>Unit Kerja:</b> ${safe(r["Unit Kerja"])}<br>
<b>Kecamatan/Desa:</b> ${safe(r["Kecamatan Desa/ Kelurahan"])}<br>
<b>Blok:</b> ${safe(r["Blok"])}<br>
<b>Nama Personil Jaga Leuweung:</b> ${safe(r["Nama Personil Jaga leuweung"])}<br>
<b>Status Persemaian:</b> ${safe(r["Status Persemaian"])}<br>
<b>Tahapan Kegiatan:</b> ${safe(r["Tahapan Kegiatan"])}<br>
<b>Luas:</b> ${safe(r["Luas (Ha)"])} Ha<br>
<b>Target Bibit:</b> ${safe(r["Target Bibit"])}<br>
<b>Realisasi Bibit:</b> ${safe(r["Realisasi Bibit"])}<br>
<b>Koordinat:</b> ${r["latitude"]} , ${r["longitude"]}<br>
<b>Keterangan:</b> ${safe(r["Keterangan"])}
</div>
`)

clusterPersemaian.addLayer(m);

dataPersemaian.push({
unit:r["Unit Kerja"],
status:r["Status Persemaian"],
kab:getKab(lat,lng)
});

});

}

// ================= PEGAWAI =================
if(type==="pegawai"){

d.forEach(r=>{

let lat = toF(r["latitude"]);
let lng = toF(r["longitude"]);

if(!lat || !lng || isNaN(lat) || isNaN(lng)) return;

let m = L.marker([lat,lng],{icon:icon("🧑‍💼")})
.bindPopup(`
<div style="max-height:250px;overflow:auto">
<b>Nama:</b> ${safe(r["Nama"])}<br>
<b>Unit Kerja:</b> ${safe(r["Unit Kerja"])}<br>
<b>Nama Jabatan:</b> ${safe(r["Nama Jabatan"])}<br>
<b>Alamat:</b> ${safe(r["Alamat"])}<br>
<b>Koordinat:</b> ${r["latitude"]} , ${r["longitude"]}
</div>
`)

clusterPegawai.addLayer(m);

dataPegawai.push({
unit:r["Unit Kerja"],
kab:getKab(lat,lng)
});

});

}

// ================= JUMAT =================
if(type==="jumat"){

d.forEach(r=>{

let lat = toF(r["Titik Koordinat (Y)"]);
let lng = toF(r["Titik Koordinat (x)"]);

if(!lat || !lng || isNaN(lat) || isNaN(lng)) return;

let m = L.marker([lat,lng],{icon:icon("📍")})
.bindPopup(`
<div style="max-height:300px;overflow:auto">
<b>Unit Kerja:</b> ${safe(r["Unit Kerja"])}<br>
<b>Kabupaten/Kota:</b> ${safe(r["Kabupaten/Kota"])}<br>
<b>Kecamatan:</b> ${safe(r["Kecamatan"])}<br>
<b>Desa/Kelurahan:</b> ${safe(r["Desa/Kelurahan"])}<br>
<b>Blok:</b> ${safe(r["Blok"])}<br>
<b>DAS:</b> ${safe(r["DAS"])}<br>
<b>Sub DAS:</b> ${safe(r["Sub DAS"])}<br>
<b>Koordinat:</b> ${safe(r["Titik Koordinat (x)"])} , ${safe(r["Titik Koordinat (Y)"])}<br>
<b>Luas Rencana Penanaman Rencana Penanaman:</b> ${safe(r["Luas Rencana Penanaman  (Ha)"])} Ha<br>
<b>Panjang:</b> ${safe(r["Panjang Rencana Penanaman (Km)"])} Km<br>
<b>Keterangan:</b> ${safe(r["Keterangan"])}
</div>
`)

clusterJumat.addLayer(m);

dataJumat.push({
unit:r["Unit Kerja"],
kab:getKab(lat,lng)
});

});

}

updateChart();

}

});

}

// ================= LOAD SEMUA DATA =================

// PJL (9 sheet)
[
"1107501735","1715712076","1053237933","1784821909",
"946859661","96096761","1779255843","635466960","360434997"
].forEach(g=>{
loadCSV(`https://docs.google.com/spreadsheets/d/e/2PACX-1vSPguLQCl8rp7VcrnOK0T_PGisuk-L-fQIKv1dpt5cO3LiN6MWoZ91RI50fhZd-KnXXa5yiOwkd2ezF/pub?gid=${g}&single=true&output=csv`,"pjl");
});

// PERSEMAIAN (9 sheet)
[
"1149553688","1364517698","144675684","1843729244",
"1981250821","1159710704","1142124495","420074128","1536834083"
].forEach(g=>{
loadCSV(`https://docs.google.com/spreadsheets/d/e/2PACX-1vS5Zmpk0bJdGg7tyvKH2RFZk-aD40ZaSMVvjSAHIiQT7jt6hqCYIHqURIjtEQx5jENQ8NvsuV3MlTtg/pub?gid=${g}&single=true&output=csv`,"persemaian");
});

// PEGAWAI
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSEHhDs2n0UKFjZlPcM4TrWQD9alaw1esFLVxjnKAD9isJ5vbKEQwhXFGYtyp8D2g/pub?gid=738073883&single=true&output=csv","pegawai");

// JUMAT
loadCSV("https://docs.google.com/spreadsheets/d/e/2PACX-1vSPtxo38ft9es4Mt0xn1oqPJQCVmYZcmyYN1GKTUBYz8b4wRX34jbQa5odSjVLwvB-yxuUnDGAV9Pou/pub?gid=2039375183&single=true&output=csv","jumat");

// ================= CHART =================
function pie(id,data){
new Chart(document.getElementById(id),{
type:'pie',
data:{
labels:Object.keys(data),
datasets:[{data:Object.values(data)}]
}
});
}

function count(arr,key){
let c={};
arr.forEach(x=>{
let k=x[key]||"Tidak ada";
c[k]=(c[k]||0)+1;
});
return c;
}

function updateChart(){
pie("chartPJL",count(dataPJL,"unit"));
pie("chartPersemaian",count(dataPersemaian,"unit"));
pie("chartPegawai",count(dataPegawai,"unit"));
pie("chartJumat",count(dataJumat,"unit"));
}

// ================= LEGEND =================
const legend = L.control({position:"bottomright"});

legend.onAdd = function(){
let d=L.DomUtil.create("div","legend");

d.innerHTML=`
<div onclick="toggle(clusterPJL)">🧑‍🌾 Petugas Jaga Leuweung</div>
<div onclick="toggle(clusterPersemaian)">🌱 Lokasi Persemaian Jaga Leuweung</div>
<div onclick="toggle(clusterPegawai)">🧑‍💼 Pegawai Dinas Kehutanan</div>
<div onclick="toggle(clusterJumat)">📍 Lokasi Unggulan Jum'at Menanam</div>
`;

return d;
};

legend.addTo(map);

function toggle(layer){
if(map.hasLayer(layer)) map.removeLayer(layer);
else map.addLayer(layer);
}

</script>
</body>
</html>
