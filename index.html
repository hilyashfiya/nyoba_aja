<!DOCTYPE html>
<html>
<head>
    <title>Peta dari Google Sheets</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- PapaParse (biar CSV kebaca rapi) -->
    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>

    <style>
        #map { height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script>
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPtxo38ft9es4Mt0xn1oqPJQCVmYZcmyYN1GKTUBYz8b4wRX34jbQa5odSjVLwvB-yxuUnDGAV9Pou/pub?gid=2039375183&single=true&output=csv";

const map = L.map('map').setView([-6.9, 107.6], 10);

// Basemap ESRI
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri'
}).addTo(map);

// 🔥 Parse CSV berdasarkan HEADER
Papa.parse(csvUrl, {
    download: true,
    header: true, // ini kunci utama
    skipEmptyLines: true,
    complete: function(results) {

        console.log("DATA PARSED:", results.data);

        results.data.forEach(row => {

            // 🔥 ambil berdasarkan NAMA KOLOM (bukan index)
            let lng = row["Titik Koordinat (X)"];
            let lat = row["Titik Koordinat (Y)"];

            if (!lng || !lat) return;

            // bersihkan format
            lng = parseFloat(lng.toString().replace(",", "."));
            lat = parseFloat(lat.toString().replace(",", "."));

            console.log("COORD:", lat, lng);

            if (!isNaN(lat) && !isNaN(lng)) {
                L.circleMarker([lat, lng], {
                    radius: 6,
                    color: "pink",
                    fillColor: "pink",
                    fillOpacity: 0.8
                })
                .addTo(map)
                .bindPopup(`
                    <b>Koordinat</b><br>
                    Lat: ${lat}<br>
                    Lng: ${lng}
                `);
            }
        });
    }
});
</script>

</body>
</html>
