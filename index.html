<!DOCTYPE html>
<html>
<head>
    <title>Peta dari Google Sheets</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        #map {
            height: 100vh;
        }
    </style>
</head>
<body>

<div id="map"></div>

<script>
// 🔥 GANTI LINK INI DENGAN CSV KAMU
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPtxo38ft9es4Mt0xn1oqPJQCVmYZcmyYN1GKTUBYz8b4wRX34jbQa5odSjVLwvB-yxuUnDGAV9Pou/pub?gid=227041905&single=true&output=csv";

const map = L.map('map').setView([-6.9, 107.6], 10);

// Basemap ESRI
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri'
}).addTo(map);

// Ambil data CSV
fetch(csvUrl)
  .then(response => response.text())
  .then(data => {
      const rows = data.split("\n").slice(1);

      rows.forEach(row => {
          const cols = row.split(",");

          const lat = parseFloat(cols[0]); // kolom latitude
          const lng = parseFloat(cols[1]); // kolom longitude
          const nama = cols[2]; // kolom nama (opsional)

          if (!isNaN(lat) && !isNaN(lng)) {
              L.marker([lat, lng])
                .addTo(map)
                .bindPopup(nama || "Lokasi");
          }
      });
  });
</script>

</body>
</html>
