<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Monitoring Kehutanan</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
    <style>
        body { margin:0; font-family:Arial, sans-serif; overflow:hidden; }
        #map { height: 100vh; width: 100%; }
        .control-panel {
            position: absolute;
            top: 10px;
            left: 10px;
            background: white;
            padding: 15px;
            border-radius: 8px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.25);
            z-index: 1000;
            max-width: 280px;
            font-size: 14px;
        }
        .legend {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.25);
            z-index: 1000;
        }
        .legend button {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 8px 0;
            padding: 8px 12px;
            border: none;
            background: #f8f9fa;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            width: 100%;
            text-align: left;
        }
        .legend button:hover { background: #e9ecef; }
        .legend button.active { background: #d4edda; font-weight: bold; }
        select, button { margin: 6px 0; padding: 8px; width: 100%; border-radius: 5px; border: 1px solid #ccc; }
        .chart-container {
            position: absolute;
            top: 10px;
            right: 10px;
            background: white;
            padding: 12px;
            border-radius: 8px;
            box-shadow: 0 3px 12px rgba(0,0,0,0.25);
            z-index: 1000;
            width: 230px;
        }
        .chart-wrapper { margin-bottom: 15px; }
        canvas { max-height: 135px !important; width: 100% !important; }
        h3 { margin: 5px 0 8px 0; font-size: 15px; text-align:center; }
    </style>
</head>
<body>
<div id="map"></div>

<!-- Control Panel -->
<div class="control-panel">
    <h3>🔎 Filter Data</h3>
    
    <!-- Basemap Baru -->
    <label>🌐 Basemap:</label>
    <select id="basemapSelect" onchange="switchBasemap(this.value)">
        <option value="osm">OpenStreetMap (Default)</option>
        <option value="esriStreet">ESRI Street</option>
        <option value="satellite">ESRI Satellite</option>
        <option value="terrain">Medan / Terrain</option>
    </select>

    <label>CDK Unit Kerja:</label>
    <select id="filterCDK" onchange="applyFilters()">
        <option value="">Semua CDK</option>
        <option value="CDK 1">CDK 1</option>
        <option value="CDK 2">CDK 2</option>
        <option value="CDK 3">CDK 3</option>
        <option value="CDK 4">CDK 4</option>
        <option value="CDK 5">CDK 5</option>
        <option value="CDK 6">CDK 6</option>
        <option value="CDK 7">CDK 7</option>
        <option value="CDK 8">CDK 8</option>
        <option value="CDK 9">CDK 9</option>
    </select>
    
    <label>Unit Kerja Pegawai:</label>
    <select id="filterPegawai" onchange="applyFilters()">
        <option value="">Semua Unit Pegawai</option>
    </select>
    
    <label>Kabupaten/Kota:</label>
    <select id="filterKabupaten" onchange="applyFilters()">
        <option value="">Semua Kabupaten</option>
    </select>
    
    <label>Status Persemaian:</label>
    <select id="filterStatus" onchange="applyFilters()">
        <option value="">Semua Status</option>
    </select>
    
    <label>Kawasan (PJL):</label>
    <select id="filterKawasan" onchange="applyFilters()">
        <option value="">Semua Kawasan</option>
    </select>
    
    <label>Penyuluh (PJL):</label>
    <select id="filterPenyuluh" onchange="applyFilters()">
        <option value="">Semua Penyuluh</option>
    </select>
    
    <button onclick="resetFilters()" style="margin-top:10px; background:#007bff; color:white; border:none; padding:10px;">Reset Semua Filter</button>
</div>

<!-- Legend (sudah bisa klik hide/unhide per layer) -->
<div class="legend">
    <h3>Layer Peta</h3>
    <button id="btnPJL" class="active" onclick="toggleLayer('pjl')">📍 PJL</button>
    <button id="btnPersemaian" class="active" onclick="toggleLayer('persemaian')">🌱 Persemaian</button>
    <button id="btnPegawai" class="active" onclick="toggleLayer('pegawai')">🧑‍💼 Pegawai</button>
    <button id="btnJumat" class="active" onclick="toggleLayer('jumat')">📅 Jumat Menanam</button>
</div>

<!-- Charts -->
<div class="chart-container">
    <h3>📊 Statistik</h3>
    <div class="chart-wrapper"><canvas id="c1"></canvas></div>
    <div class="chart-wrapper"><canvas id="c2"></canvas></div>
    <div class="chart-wrapper"><canvas id="c3"></canvas></div>
    <div class="chart-wrapper"><canvas id="c4"></canvas></div>
    <div class="chart-wrapper"><canvas id="c5"></canvas></div>
</div>

<script>
// ================== GLOBAL VARIABLES ==================
let map;
let layerPJL = L.layerGroup();
let layerPersemaian = L.layerGroup();
let layerPegawai = L.layerGroup();
let layerJumat = L.layerGroup();
let DATA = { pjl: [], persemaian: [], pegawai: [], jumat: [] };
let charts = [];
let currentFilters = {
    cdk: "", pegawaiUnit: "", kabupaten: "", status: "", kawasan: "", penyuluh: ""
};
let layerVisibility = { pjl: true, persemaian: true, pegawai: true, jumat: true };
let basemaps = {};
let currentBasemapLayer;

// Icons
const iconPJL = L.divIcon({className: 'custom-icon', html: '📍', iconSize: [30,30]});
const iconPers = L.divIcon({className: 'custom-icon', html: '🌱', iconSize: [30,30]});
const iconPeg = L.divIcon({className: 'custom-icon', html: '🧑‍💼', iconSize: [30,30]});
const iconJum = L.divIcon({className: 'custom-icon', html: '📅', iconSize: [30,30]});

const f = (val) => val ? parseFloat(String(val).trim()) : null;
const safe = (val) => val ? String(val).trim() : "-";

function getCDK(unit) {
    if (!unit) return null;
    const match = unit.match(/(CDK\s?\d+)/i);
    return match ? match[0].toUpperCase() : null;
}

// ================== ROBUST COORDINATE PARSER ==================
function getLatLng(row, type) {
    let latKeys = [], lngKeys = [];
    if (type === 'pjl' || type === 'jumat') {
        latKeys = ["Titik Koordinat (Y)", "latitude", "Lat", "Y", "Titik Koordinat Y"];
        lngKeys = ["Titik Koordinat (x)", "longitude", "Lng", "X", "Titik Koordinat X"];
    } else if (type === 'persemaian') {
        latKeys = ["Titik Koordinat (Y)", "latitude", "Lat", "Y", "Titik Koordinat Y"];
        lngKeys = ["Titik Koordinat (x)", "longitude", "Lng", "X", "Titik Koordinat X"];
    } else if (type === 'pegawai') {
        latKeys = ["latitude", "Titik Koordinat (Y)", "Lat", "Y"];
        lngKeys = ["longitude", "Titik Koordinat (x)", "Lng", "X"];
    }
    let lat = null, lng = null;
    for (let k of latKeys) {
        if (row[k] && f(row[k]) !== null) { lat = f(row[k]); break; }
    }
    for (let k of lngKeys) {
        if (row[k] && f(row[k]) !== null) { lng = f(row[k]); break; }
    }
    return [lat, lng];
}

// ================== IMPROVED CSV PARSER (handle koma di dalam field) ==================
function parseCSV(text) {
    const lines = text.split(/\r?\n/);
    if (lines.length === 0) return [];
    const headers = lines[0].split(',').map(h => h.replace(/^"|"$/g, '').trim());
    const data = [];
    for (let i = 1; i < lines.length; i++) {
        if (!lines[i].trim()) continue;
        const row = [];
        let cell = '';
        let inQuotes = false;
        let j = 0;
        while (j < lines[i].length) {
            const char = lines[i][j];
            if (char === '"') {
                if (inQuotes && lines[i][j + 1] === '"') {
                    cell += '"';
                    j += 2;
                    continue;
                }
                inQuotes = !inQuotes;
            } else if (char === ',' && !inQuotes) {
                row.push(cell.trim());
                cell = '';
            } else {
                cell += char;
            }
            j++;
        }
        row.push(cell.trim());
        const obj = {};
        headers.forEach((h, idx) => {
            obj[h] = (row[idx] || "").replace(/^"|"$/g, '').trim();
        });
        data.push(obj);
    }
    return data.filter(r => Object.keys(r).length > 1);
}

// ================== LOAD CSV (APPEND untuk multiple sheet) ==================
async function loadCSV(url, type) {
    try {
        const res = await fetch(url);
        const text = await res.text();
        const parsedData = parseCSV(text);
        if (!DATA[type]) DATA[type] = [];
        DATA[type].push(...parsedData);
        console.log(`✅ Loaded ${parsedData.length} data for ${type} from ${url}`);
    } catch(e) {
        console.error(`Failed loading ${type} from ${url}`, e);
    }
}

// ================== MAPS LINK ==================
function mapsLink(lat, lng) {
    return `<a href="https://www.google.com/maps?q=${lat},${lng}" target="_blank" style="color:blue;">Lihat di Google Maps →</a>`;
}

// ================== POPUP FULL DETAIL ==================
function createPJLPopup(r, lat, lng) {
    return `
    <div style="max-height:320px;overflow:auto;font-size:12px;line-height:1.5">
        <b>📍 PJL</b><hr>
        <b>Unit Kerja:</b><br>${safe(r["Unit Kerja"])}<br>
        <b>Kawasan:</b><br>${safe(r["Kawasan"])}<br>
        <b>Penyuluh:</b><br>${safe(r["Penyuluh"])}<br>
        <b>Koordinat:</b><br>${lat}, ${lng}<hr>
        ${mapsLink(lat,lng)}
    </div>`;
}
function createPersemaianPopup(r, lat, lng) {
    return `
    <div style="max-height:320px;overflow:auto;font-size:12px;line-height:1.5">
        <b>🌱 PERSEMAIAN</b><hr>
        <b>Unit Kerja:</b><br>${safe(r["Unit Kerja"])}<br>
        <b>Status:</b><br>${safe(r["Status"])}<br>
        <b>Kabupaten/Kota:</b><br>${safe(r["Kabupaten/Kota"])}<br>
        <b>Kecamatan:</b><br>${safe(r["Kecamatan"])}<br>
        <b>Desa/Kelurahan:</b><br>${safe(r["Desa/Kelurahan"])}<br>
        <b>Koordinat:</b><br>${lat}, ${lng}<hr>
        ${mapsLink(lat,lng)}
    </div>`;
}
function createPegawaiPopup(r, lat, lng) {
    return `
    <div style="max-height:280px;overflow:auto;font-size:12px;line-height:1.5">
        <b>🧑‍💼 PEGAWAI DINAS KEHUTANAN</b><hr>
        <b>Nama:</b><br>${safe(r["Nama"])}<br>
        <b>Unit Kerja:</b><br>${safe(r["Unit Kerja"])}<br>
        <b>Nama Jabatan:</b><br>${safe(r["Nama Jabatan"])}<br>
        <b>Alamat:</b><br>${safe(r["Alamat"])}<br>
        <b>Koordinat:</b><br>${lat} , ${lng}<hr>
        ${mapsLink(lat,lng)}
    </div>`;
}
function createJumatPopup(r, lat, lng) {
    return `
    <div style="max-height:320px;overflow:auto;font-size:12px;line-height:1.5">
        <b>📍 LOKASI UNGGULAN JUM'AT MENANAM</b><hr>
        <b>Unit Kerja:</b><br>${safe(r["Unit Kerja"])}<br>
        <b>Kabupaten/Kota:</b><br>${safe(r["Kabupaten/Kota"])}<br>
        <b>Kecamatan:</b><br>${safe(r["Kecamatan"])}<br>
        <b>Desa/Kelurahan:</b><br>${safe(r["Desa/Kelurahan"])}<br>
        <b>Blok:</b><br>${safe(r["Blok"])}<br>
        <b>DAS:</b><br>${safe(r["DAS"])}<br>
        <b>Sub DAS:</b><br>${safe(r["Sub DAS"])}<br>
        <b>Titik Koordinat (X,Y):</b><br>${safe(r["Titik Koordinat (x)"])} , ${safe(r["Titik Koordinat (Y)"])}<br>
        <b>Luas Rencana Penanaman (Ha):</b><br>${safe(r["Luas Rencana Penanaman (Ha)"])}<br>
        <b>Panjang Rencana Penanaman (Km):</b><br>${safe(r["Panjang Rencana Penanaman (Km)"])}<br>
        <b>Keterangan:</b><br>${safe(r["Keterangan"])}<hr>
        ${mapsLink(lat,lng)}
    </div>`;
}

// ================== ADD MARKERS ==================
function addMarkers() {
    layerPJL.clearLayers();
    layerPersemaian.clearLayers();
    layerPegawai.clearLayers();
    layerJumat.clearLayers();

    const cdkFilter = currentFilters.cdk;

    // PJL
    DATA.pjl.forEach(r => {
        if (cdkFilter && getCDK(r["Unit Kerja"]) !== cdkFilter) return;
        if (currentFilters.kawasan && r["Kawasan"] !== currentFilters.kawasan) return;
        if (currentFilters.penyuluh && r["Penyuluh"] !== currentFilters.penyuluh) return;
        const [lat, lng] = getLatLng(r, 'pjl');
        if (!lat || !lng) return;
        L.marker([lat, lng], {icon: iconPJL})
          .bindPopup(createPJLPopup(r, lat, lng))
          .addTo(layerPJL);
    });

    // Persemaian
    DATA.persemaian.forEach(r => {
        if (cdkFilter && getCDK(r["Unit Kerja"]) !== cdkFilter) return;
        if (currentFilters.status && r["Status"] !== currentFilters.status) return;
        if (currentFilters.kabupaten && r["Kabupaten/Kota"] !== currentFilters.kabupaten) return;
        const [lat, lng] = getLatLng(r, 'persemaian');
        if (!lat || !lng) return;
        L.marker([lat, lng], {icon: iconPers})
          .bindPopup(createPersemaianPopup(r, lat, lng))
          .addTo(layerPersemaian);
    });

    // Pegawai (menggunakan field "Unit Kerja" dari sheet pegawai)
    DATA.pegawai.forEach(r => {
        if (cdkFilter && getCDK(r["Unit Kerja"]) !== cdkFilter) return;
        if (currentFilters.pegawaiUnit && r["Unit Kerja"] !== currentFilters.pegawaiUnit) return;
        const [lat, lng] = getLatLng(r, 'pegawai');
        if (!lat || !lng) return;
        L.marker([lat, lng], {icon: iconPeg})
          .bindPopup(createPegawaiPopup(r, lat, lng))
          .addTo(layerPegawai);
    });

    // Jumat Menanam
    DATA.jumat.forEach(r => {
        if (cdkFilter && getCDK(r["Unit Kerja"]) !== cdkFilter) return;
        if (currentFilters.kabupaten && r["Kabupaten/Kota"] !== currentFilters.kabupaten) return;
        const [lat, lng] = getLatLng(r, 'jumat');
        if (!lat || !lng) return;
        L.marker([lat, lng], {icon: iconJum})
          .bindPopup(createJumatPopup(r, lat, lng))
          .addTo(layerJumat);
    });

    updateChart();
}

// ================== FILTER POPULATION ==================
function populateFilterOptions() {
    // Unit Kerja Pegawai (dari sheet data pegawai)
    const pegUnits = [...new Set(DATA.pegawai.map(r => r["Unit Kerja"]).filter(Boolean))].sort();
    const pegSelect = document.getElementById('filterPegawai');
    pegUnits.forEach(u => {
        let opt = document.createElement('option');
        opt.value = u; opt.textContent = u;
        pegSelect.appendChild(opt);
    });

    // Kabupaten
    const kabSet = new Set([
        ...DATA.persemaian.map(r => r["Kabupaten/Kota"]),
        ...DATA.jumat.map(r => r["Kabupaten/Kota"])
    ].filter(Boolean));
    const kabSelect = document.getElementById('filterKabupaten');
    Array.from(kabSet).sort().forEach(k => {
        let opt = document.createElement('option');
        opt.value = k; opt.textContent = k;
        kabSelect.appendChild(opt);
    });

    // Status Persemaian
    const statusSet = new Set(DATA.persemaian.map(r => r["Status"]).filter(Boolean));
    const statusSelect = document.getElementById('filterStatus');
    Array.from(statusSet).sort().forEach(s => {
        let opt = document.createElement('option');
        opt.value = s; opt.textContent = s;
        statusSelect.appendChild(opt);
    });

    // Kawasan PJL
    const kawasanSet = new Set(DATA.pjl.map(r => r["Kawasan"]).filter(Boolean));
    const kawSelect = document.getElementById('filterKawasan');
    Array.from(kawasanSet).sort().forEach(k => {
        let opt = document.createElement('option');
        opt.value = k; opt.textContent = k;
        kawSelect.appendChild(opt);
    });

    // Penyuluh PJL
    const penyuluhSet = new Set(DATA.pjl.map(r => r["Penyuluh"]).filter(Boolean));
    const penSelect = document.getElementById('filterPenyuluh');
    Array.from(penyuluhSet).sort().forEach(p => {
        let opt = document.createElement('option');
        opt.value = p; opt.textContent = p;
        penSelect.appendChild(opt);
    });

    console.log('✅ Filter dropdowns populated');
}

// ================== APPLY FILTERS ==================
function applyFilters() {
    currentFilters.cdk = document.getElementById('filterCDK').value;
    currentFilters.pegawaiUnit = document.getElementById('filterPegawai').value;
    currentFilters.kabupaten = document.getElementById('filterKabupaten').value;
    currentFilters.status = document.getElementById('filterStatus').value;
    currentFilters.kawasan = document.getElementById('filterKawasan').value;
    currentFilters.penyuluh = document.getElementById('filterPenyuluh').value;
    addMarkers();
}

function resetFilters() {
    document.getElementById('filterCDK').value = '';
    document.getElementById('filterPegawai').value = '';
    document.getElementById('filterKabupaten').value = '';
    document.getElementById('filterStatus').value = '';
    document.getElementById('filterKawasan').value = '';
    document.getElementById('filterPenyuluh').value = '';
    applyFilters();
}

// ================== TOGGLE LAYER (LEGEND) ==================
function toggleLayer(type) {
    const btn = document.getElementById(`btn${type.charAt(0).toUpperCase() + type.slice(1)}`);
    layerVisibility[type] = !layerVisibility[type];
    if (layerVisibility[type]) {
        btn.classList.add('active');
        if (type === 'pjl') layerPJL.addTo(map);
        if (type === 'persemaian') layerPersemaian.addTo(map);
        if (type === 'pegawai') layerPegawai.addTo(map);
        if (type === 'jumat') layerJumat.addTo(map);
    } else {
        btn.classList.remove('active');
        if (type === 'pjl') map.removeLayer(layerPJL);
        if (type === 'persemaian') map.removeLayer(layerPersemaian);
        if (type === 'pegawai') map.removeLayer(layerPegawai);
        if (type === 'jumat') map.removeLayer(layerJumat);
    }
}

// ================== BASemap SWITCHER ==================
function switchBasemap(name) {
    if (currentBasemapLayer) map.removeLayer(currentBasemapLayer);
    currentBasemapLayer = basemaps[name];
    currentBasemapLayer.addTo(map);
}

// ================== CHART ==================
function updateChart() {
    charts.forEach(c => c.destroy());
    charts = [];
    const cdkFilter = currentFilters.cdk;

    const countByCDK = (arr) => {
        let c = {};
        arr.forEach(r => {
            if (cdkFilter && getCDK(r["Unit Kerja"]) !== cdkFilter) return;
            let u = getCDK(r["Unit Kerja"]);
            if (u) c[u] = (c[u] || 0) + 1;
        });
        return c;
    };

    const countPegawai = () => {
        let c = {};
        DATA.pegawai.forEach(r => {
            if (cdkFilter && getCDK(r["Unit Kerja"]) !== cdkFilter) return;
            let u = r["Unit Kerja"];
            if (u) c[u] = (c[u] || 0) + 1;
        });
        return c;
    };

    const agg = {
        PJL: DATA.pjl.filter(r => !cdkFilter || getCDK(r["Unit Kerja"]) === cdkFilter).length,
        Persemaian: DATA.persemaian.filter(r => !cdkFilter || getCDK(r["Unit Kerja"]) === cdkFilter).length,
        Pegawai: DATA.pegawai.filter(r => !cdkFilter || getCDK(r["Unit Kerja"]) === cdkFilter).length,
        Jumat: DATA.jumat.filter(r => !cdkFilter || getCDK(r["Unit Kerja"]) === cdkFilter).length
    };

    function makeChart(id, data, title) {
        charts.push(new Chart(document.getElementById(id), {
            type: 'doughnut',
            data: {
                labels: Object.keys(data),
                datasets: [{ 
                    data: Object.values(data), 
                    backgroundColor: ['#4CAF50', '#2196F3', '#FF9800', '#E91E63', '#9C27B0', '#00BCD4', '#FF5722', '#607D8B', '#8BC34A']
                }]
            },
            options: {
                responsive: true,
                maintainAspectRatio: true,
                plugins: {
                    legend: { display: false },
                    title: { display: true, text: title, font: { size: 13 } }
                }
            }
        }));
    }

    makeChart("c1", countByCDK(DATA.pjl), "PJL per CDK");
    makeChart("c2", countByCDK(DATA.persemaian), "Persemaian per CDK");
    makeChart("c3", countPegawai(), "Pegawai");
    makeChart("c4", countByCDK(DATA.jumat), "Jumat Menanam per CDK");
    makeChart("c5", agg, "Total Keseluruhan");
}

// ================== INITIALIZE MAP + BASEMAPS ==================
function initMap() {
    map = L.map('map').setView([-2.5, 118], 5);

    // Basemaps
    basemaps.osm = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenStreetMap contributors'
    });
    basemaps.esriStreet = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Street_Map/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles © Esri'
    });
    basemaps.satellite = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
        attribution: 'Tiles © Esri — Source: Esri, Maxar, Earthstar Geographics'
    });
    basemaps.terrain = L.tileLayer('https://{s}.tile.opentopomap.org/{z}/{x}/{y}.png', {
        attribution: '&copy; OpenTopoMap contributors'
    });

    // Default OSM
    currentBasemapLayer = basemaps.osm;
    currentBasemapLayer.addTo(map);

    // Tambahkan semua layer group
    layerPJL.addTo(map);
    layerPersemaian.addTo(map);
    layerPegawai.addTo(map);
    layerJumat.addTo(map);
}

// ================== LOAD ALL DATA (MULTIPLE SHEET DILOAD SEMUA) ==================
async function loadAllData() {
    await Promise.all([
