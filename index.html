<script>
// 🔥 GANTI DENGAN LINK CSV KAMU
const csvUrl = "https://docs.google.com/spreadsheets/d/e/2PACX-1vSPtxo38ft9es4Mt0xn1oqPJQCVmYZcmyYN1GKTUBYz8b4wRX34jbQa5odSjVLwvB-yxuUnDGAV9Pou/pub?output=csv";

const map = L.map('map').setView([-6.9, 107.6], 10);

// Basemap ESRI
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
    attribution: 'Tiles © Esri'
}).addTo(map);

// Ambil data CSV
fetch(csvUrl)
  .then(response => response.text())
  .then(data => {
      const rows = data.split("\n");
      const header = rows[0].split(",");

      // 🔍 Cari index kolom berdasarkan nama
      const xIndex = header.indexOf("Titik Koordinat (X)");
      const yIndex = header.indexOf("Titik Koordinat (Y)");

      rows.slice(1).forEach(row => {
          const cols = row.split(",");

          const lng = parseFloat(cols[xIndex]); // X = longitude
          const lat = parseFloat(cols[yIndex]); // Y = latitude

          if (!isNaN(lat) && !isNaN(lng)) {
              L.marker([lat, lng])
                .addTo(map)
                .bindPopup(`Lat: ${lat}<br>Lng: ${lng}`);
          }
      });
  });
</script>
